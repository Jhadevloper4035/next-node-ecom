services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: ecom_backend
    restart: unless-stopped
    command: node src/server.js
    ports:
      - "5000:5000"
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      COOKIE_SECURE: "true"
      TRUST_PROXY: "true"
    volumes: []
    depends_on:
      redis:
        condition: service_healthy
    networks: [app_network]

  frontend:
    build:
      context: ./frontend
      target: runner
    container_name: ecom_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
    volumes: []
    depends_on:
      - backend
    networks: [app_network]

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks: [app_network]

  mongo:
    profiles: ["donotstart"]

  mongo-express:
    profiles: ["donotstart"]

  mailpit:
    image: axllent/mailpit:latest
    profiles: ["donotstart"]

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge