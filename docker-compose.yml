# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — development (backend + frontend)
#
# Quick start:
#   1) cp .env.development.example .env.development
#   2) cp frontend/.env.development.example frontend/.env.development
#   3) docker compose up --build
#
# URLs:
#   Frontend: http://localhost:3000
#   Backend:  http://localhost:5000/api/v1
#   Mailpit:  http://localhost:8025
#   Mongo UI: http://localhost:8081
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      target: base
    container_name: ecom_backend
    restart: unless-stopped
    command: npm run dev
    ports:
      - "5000:5000"
    env_file:
      - ./.env.development
    environment:
      # Docker service names
      MONGODB_URI: mongodb://mongo:27017/node_auth_mvc
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      TRUST_PROXY: "true"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks: [app_network]

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: ecom_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks: [app_network]

  mongo:
    image: mongo:7
    container_name: ecom_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: node_auth_mvc
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [app_network]

  mongo-express:
    image: mongo-express:latest
    container_name: ecom_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongo:
        condition: service_healthy
    networks: [app_network]

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks: [app_network]

  mailpit:
    image: axllent/mailpit:latest
    container_name: ecom_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks: [app_network]

volumes:
  mongo_data:
  redis_data:

networks:
  app_network:
    driver: bridge
